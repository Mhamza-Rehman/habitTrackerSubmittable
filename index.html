<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header" aria-label="Week navigation">
      <div class="header-top">
        <h1 class="app-title">Habit Tracker</h1>
        <p class="week-range" aria-live="polite">Week of May 18 - May 24, 2026</p>
      </div>

      <div class="week-controls" role="group" aria-label="Week controls">
        <button type="button" class="btn btn-secondary" id="prevWeekBtn">Prev</button>
        <button type="button" class="btn btn-primary" id="thisWeekBtn">This Week</button>
        <button type="button" class="btn btn-secondary" id="nextWeekBtn">Next</button>
      </div>
    </header>

    <section class="habit-entry" aria-label="Add habit">
      <form class="habit-form" id="habitForm">
        <label for="habitName" class="sr-only">Habit name</label>
        <input
          id="habitName"
          name="habitName"
          type="text"
          placeholder="Add a new habit"
          autocomplete="off"
          required
        />
        <button type="submit" class="btn btn-success">Add Habit</button>
      </form>
    </section>

    <main class="tracker-main" aria-label="Habit grid area">
      <section class="empty-state" id="emptyState">
        <h2>No habits yet</h2>
        <p>Add your first habit to start tracking this week.</p>
      </section>

      <section class="grid-scroll" aria-label="Habit tracking grid">
        <table class="habit-grid" aria-describedby="gridCaption">
          <caption id="gridCaption" class="sr-only">Weekly habit matrix</caption>
          <thead>
            <tr>
              <th scope="col">Habit</th>
              <th scope="col">Mon</th>
              <th scope="col">Tue</th>
              <th scope="col">Wed</th>
              <th scope="col">Thu</th>
              <th scope="col">Fri</th>
              <th scope="col">Sat</th>
              <th scope="col">Sun</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
